version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aqua8_db
      POSTGRES_USER: aqua8
      POSTGRES_PASSWORD: aqua8_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    volumes:
      - ./backend:/app
      - media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://aqua8:aqua8_pass@db:5432/aqua8_db
      - SECRET_KEY=dev-secret-key
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - media:/media
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  media:
